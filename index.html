<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>StudyShare</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --blue:#3b5bdb;--blue-dark:#2f4ac2;--blue-light:#eef1fc;
  --green:#2f9e44;--red:#e03131;--amber:#f08c00;
  --bg:#f6f7fb;--card:#fff;--border:#e4e6ef;
  --text:#1a1a2e;--muted:#6b7280;--sidebar-w:220px;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(10,12,30,0.65);backdrop-filter:blur(6px);z-index:1000;display:flex;align-items:center;justify-content:center;}
.modal-overlay.hidden{display:none;}
.modal{background:#fff;border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.2);animation:popIn .25s ease;}
@keyframes popIn{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.modal-logo{display:flex;align-items:center;gap:.5rem;font-size:1.3rem;font-weight:800;justify-content:center;margin-bottom:1.5rem;}
.modal-logo span{color:var(--blue);}
.modal-tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:1.5rem;}
.modal-tab{flex:1;text-align:center;padding:.6rem;font-weight:600;font-size:.9rem;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .2s,border-color .2s;}
.modal-tab.active{color:var(--blue);border-color:var(--blue);}
.form-group{margin-bottom:1rem;}
.form-group label{display:block;font-size:.8rem;font-weight:600;color:var(--muted);margin-bottom:.4rem;letter-spacing:.04em;text-transform:uppercase;}
.form-group input,.form-group select{width:100%;padding:.7rem .9rem;border:1.5px solid var(--border);border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.9rem;color:var(--text);outline:none;transition:border-color .2s;}
.form-group input:focus,.form-group select:focus{border-color:var(--blue);}
.btn-full{width:100%;padding:.8rem;background:var(--blue);color:#fff;border:none;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;transition:background .2s,transform .1s;margin-top:.5rem;}
.btn-full:hover{background:var(--blue-dark);}
.btn-full:active{transform:scale(.98);}
.btn-full:disabled{opacity:.6;cursor:not-allowed;}
.form-hint{text-align:center;font-size:.78rem;color:var(--muted);margin-top:.75rem;}
.form-error{background:#fff0f0;border:1px solid #ffc0c0;color:var(--red);border-radius:7px;padding:.6rem .8rem;font-size:.82rem;margin-top:.5rem;display:none;}
.form-error.visible{display:block;}

/* APP */
#app{display:none;height:100vh;flex-direction:column;}
#app.visible{display:flex;}

/* TOPBAR */
.topbar{height:56px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;flex-shrink:0;position:sticky;top:0;z-index:50;}
.t-logo{font-size:1.1rem;font-weight:800;display:flex;align-items:center;gap:.4rem;}
.t-logo span{color:var(--blue);}
.t-right{display:flex;align-items:center;gap:1rem;position:relative;}
.notif-btn{position:relative;cursor:pointer;background:none;border:none;padding:.3rem;}
.notif-btn svg{width:20px;height:20px;color:var(--muted);}
.notif-badge{position:absolute;top:0;right:0;background:var(--red);color:#fff;border-radius:50%;width:16px;height:16px;font-size:.6rem;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid #fff;}
.notif-badge.hidden{display:none;}
.user-chip{display:flex;align-items:center;gap:.5rem;}
.avatar{width:32px;height:32px;background:var(--blue-light);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.75rem;color:var(--blue);}
.uname{font-weight:600;font-size:.85rem;}
.logout-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:.3rem .75rem;font-family:'Plus Jakarta Sans',sans-serif;font-size:.8rem;font-weight:600;color:var(--muted);cursor:pointer;}
.logout-btn:hover{background:var(--bg);}

/* NOTIF PANEL */
.notif-panel{position:absolute;top:52px;right:0;width:320px;background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.12);z-index:200;overflow:hidden;}
.notif-panel.hidden{display:none;}
.notif-header{padding:.75rem 1rem;border-bottom:1px solid var(--border);font-weight:700;font-size:.9rem;display:flex;justify-content:space-between;align-items:center;}
.notif-clear{font-size:.75rem;font-weight:500;color:var(--blue);cursor:pointer;}
.notif-list{max-height:320px;overflow-y:auto;}
.notif-item{padding:.75rem 1rem;border-bottom:1px solid var(--border);display:flex;gap:.6rem;align-items:flex-start;}
.notif-item:last-child{border-bottom:none;}
.notif-dot2{width:8px;height:8px;background:var(--blue);border-radius:50%;margin-top:4px;flex-shrink:0;}
.notif-item p{font-size:.82rem;line-height:1.5;}
.notif-item time{font-size:.72rem;color:var(--muted);display:block;margin-top:2px;}
.notif-empty{padding:1.5rem;text-align:center;color:var(--muted);font-size:.85rem;}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden;}
.sidebar{width:var(--sidebar-w);background:#fff;border-right:1px solid var(--border);flex-shrink:0;overflow-y:auto;padding:1rem 0;}
.sidebar-label{font-size:.68rem;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;padding:.25rem 1.25rem .5rem;}
.nav-item{display:flex;align-items:center;gap:.6rem;padding:.55rem 1.25rem;font-size:.87rem;font-weight:500;color:#444;cursor:pointer;border-left:3px solid transparent;transition:background .15s,color .15s;}
.nav-item:hover{background:var(--blue-light);color:var(--blue);}
.nav-item.active{background:var(--blue-light);color:var(--blue);font-weight:700;border-left-color:var(--blue);}
.nav-item svg{width:16px;height:16px;flex-shrink:0;}
.main{flex:1;overflow-y:auto;padding:1.5rem;}

/* BREADCRUMB */
.breadcrumb{display:flex;align-items:center;gap:.4rem;font-size:.8rem;color:var(--muted);margin-bottom:1rem;flex-wrap:wrap;}
.breadcrumb span{cursor:pointer;transition:color .15s;}
.breadcrumb span:hover{color:var(--blue);}
.breadcrumb .sep{color:var(--border);}
.breadcrumb .current{color:var(--text);font-weight:600;cursor:default;}

/* PAGE HEADER */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:.75rem;}
.page-title{font-size:1.3rem;font-weight:800;letter-spacing:-.02em;}

/* SEARCH */
.search-bar{display:flex;gap:0;flex:1;max-width:400px;}
.search-input{flex:1;padding:.6rem .9rem;border:1.5px solid var(--border);border-right:none;border-radius:8px 0 0 8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.85rem;outline:none;transition:border-color .2s;}
.search-input:focus{border-color:var(--blue);}
.search-btn{background:var(--blue);border:none;border-radius:0 8px 8px 0;padding:0 .9rem;cursor:pointer;}
.search-btn svg{width:16px;height:16px;color:#fff;}

/* FOLDERS */
.folder-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem;}
.folder-card{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:1.25rem 1rem;display:flex;flex-direction:column;align-items:center;gap:.6rem;cursor:pointer;transition:border-color .2s,box-shadow .2s,transform .15s;}
.folder-card:hover{border-color:var(--blue);box-shadow:0 4px 16px rgba(59,91,219,.12);transform:translateY(-2px);}
.folder-icon{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;}
.folder-icon svg{width:26px;height:26px;}
.folder-name{font-weight:700;font-size:.88rem;text-align:center;}
.folder-count{font-size:.75rem;color:var(--muted);}

/* FILES */
.file-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;}
.file-card{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:box-shadow .2s,transform .15s;}
.file-card:hover{box-shadow:0 4px 20px rgba(59,91,219,.1);transform:translateY(-2px);}
.file-thumb{height:130px;display:flex;align-items:center;justify-content:center;position:relative;}
.thumb-blue{background:#dde7ff;}
.thumb-green{background:#d3f9d8;}
.thumb-pink{background:#fce4ec;}
.thumb-amber{background:#fff3cd;}
.thumb-gray{background:#f0f0f0;}
.file-pdf{width:56px;height:70px;background:#fff;border-radius:4px;border:1.5px solid #dde2f5;display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;position:relative;box-shadow:0 2px 8px rgba(0,0,0,.07);}
.file-pdf::before{content:'';position:absolute;top:10px;left:8px;right:8px;height:3px;background:#c5cfe8;border-radius:2px;box-shadow:0 6px 0 #c5cfe8,0 12px 0 #c5cfe8,0 18px 0 #c5cfe8;}
.pdf-tag{background:#e63946;color:#fff;font-size:.5rem;font-weight:700;padding:2px 5px;border-radius:2px;letter-spacing:.04em;}
.file-badge{position:absolute;top:8px;right:8px;font-size:.62rem;font-weight:700;padding:2px 7px;border-radius:4px;}
.badge-new{background:#d3f9d8;color:#2f9e44;}
.file-body{padding:.85rem;}
.file-title{font-weight:600;font-size:.83rem;line-height:1.35;margin-bottom:.6rem;}
.file-meta{display:flex;align-items:center;justify-content:space-between;}
.stars{font-size:.75rem;color:var(--muted);}
.stars .s{color:#f4a629;}
.btn-dl{background:var(--blue);color:#fff;border:none;border-radius:5px;padding:.3rem .75rem;font-family:'Plus Jakarta Sans',sans-serif;font-size:.75rem;font-weight:600;cursor:pointer;text-decoration:none;display:inline-block;}
.btn-dl:hover{opacity:.85;}
.verified-tag{background:#d3f9d8;color:#2f9e44;font-size:.65rem;font-weight:700;padding:1px 6px;border-radius:3px;}

/* UPLOAD */
.upload-panel{background:#fff;border:2px dashed var(--border);border-radius:12px;padding:1.5rem;text-align:center;margin-bottom:1.5rem;cursor:pointer;transition:border-color .2s;}
.upload-panel:hover{border-color:var(--blue);}
.upload-panel svg{width:36px;height:36px;color:var(--blue);margin:0 auto .5rem;display:block;}
.upload-panel p{color:var(--muted);font-size:.85rem;margin-bottom:.75rem;}
.btn-upload{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:.55rem 1.3rem;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:.82rem;cursor:pointer;}

/* UPLOAD MODAL */
.upload-modal{position:fixed;inset:0;background:rgba(10,12,30,.65);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;}
.upload-modal.hidden{display:none;}
.upload-box{background:#fff;border-radius:14px;padding:2rem;width:100%;max-width:480px;box-shadow:0 16px 50px rgba(0,0,0,.18);animation:popIn .2s ease;max-height:90vh;overflow-y:auto;}
.upload-box h3{font-size:1.1rem;font-weight:800;margin-bottom:1.25rem;}
.upload-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;}
.btn-row{display:flex;gap:.75rem;justify-content:flex-end;margin-top:1rem;}
.btn-cancel{background:none;border:1.5px solid var(--border);border-radius:8px;padding:.6rem 1.2rem;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;font-size:.85rem;cursor:pointer;}
.btn-submit{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:.6rem 1.4rem;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:.85rem;cursor:pointer;}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;}

/* DOUBT SOLVER */
.filter-chip{padding:.4rem .85rem;border:1.5px solid var(--border);border-radius:20px;font-size:.8rem;font-weight:600;cursor:pointer;background:#fff;transition:background .15s,border-color .15s,color .15s;}
.filter-chip:hover,.filter-chip.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.sort-select{padding:.4rem .75rem;border:1.5px solid var(--border);border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.8rem;outline:none;cursor:pointer;}
.doubt-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:1rem 1.25rem;margin-bottom:.85rem;}
.doubt-subject{font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:4px;letter-spacing:.04em;}
.sub-math{background:#dde7ff;color:#3b5bdb;}
.sub-sci{background:#d3f9d8;color:#2f9e44;}
.sub-eng{background:#fff3cd;color:#f08c00;}
.sub-other{background:#f0f0f0;color:#555;}
.doubt-status{font-size:.72rem;font-weight:600;padding:2px 8px;border-radius:12px;}
.status-open{background:#fff3cd;color:#f08c00;}
.status-answered{background:#d3f9d8;color:#2f9e44;}
.answer-item{background:var(--bg);border-radius:8px;padding:.65rem .9rem;margin-bottom:.5rem;font-size:.83rem;line-height:1.6;}
.answer-by{font-weight:600;font-size:.75rem;color:var(--blue);margin-bottom:.2rem;}
.reply-input-row{display:flex;gap:.5rem;margin-top:.5rem;}
.reply-input{flex:1;padding:.5rem .75rem;border:1.5px solid var(--border);border-radius:7px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.82rem;outline:none;}
.reply-input:focus{border-color:var(--blue);}
.btn-reply{background:var(--blue);color:#fff;border:none;border-radius:7px;padding:.5rem 1rem;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:.8rem;cursor:pointer;}
.post-doubt-form{background:#fff;border:1px solid var(--border);border-radius:10px;padding:1.25rem;margin-bottom:1.25rem;}
.post-doubt-form h4{font-weight:700;margin-bottom:.85rem;}
.post-doubt-form textarea{width:100%;padding:.7rem .9rem;border:1.5px solid var(--border);border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.85rem;resize:vertical;outline:none;min-height:80px;}
.post-doubt-form textarea:focus{border-color:var(--blue);}

/* FORUM */
.notice-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:1.1rem 1.25rem;margin-bottom:.85rem;}
.notice-course{font-size:.72rem;font-weight:700;background:var(--blue-light);color:var(--blue);padding:2px 8px;border-radius:4px;}
.notice-date{font-size:.72rem;color:var(--muted);}

/* DASHBOARD */
.welcome-banner{background:linear-gradient(135deg,var(--blue) 0%,#5c7cfa 100%);border-radius:14px;padding:1.75rem 2rem;color:#fff;margin-bottom:1.5rem;position:relative;overflow:hidden;}
.welcome-banner::after{content:'';position:absolute;right:-40px;top:-40px;width:200px;height:200px;background:rgba(255,255,255,.07);border-radius:50%;}
.welcome-banner h2{font-size:1.4rem;font-weight:800;margin-bottom:.3rem;}
.welcome-banner p{opacity:.85;font-size:.9rem;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem;}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:1rem 1.1rem;}
.stat-label2{font-size:.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem;}
.stat-val{font-size:1.5rem;font-weight:800;}
.stat-sub{font-size:.72rem;color:var(--muted);margin-top:.15rem;}

/* BACK BTN */
.back-btn{display:inline-flex;align-items:center;gap:.35rem;font-size:.82rem;font-weight:600;color:var(--blue);cursor:pointer;margin-bottom:1rem;background:none;border:none;font-family:'Plus Jakarta Sans',sans-serif;}

/* LOADING */
.loading-state{text-align:center;padding:3rem;color:var(--muted);}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 1rem;}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#1a1a2e;color:#fff;padding:.75rem 1.25rem;border-radius:10px;font-size:.85rem;font-weight:500;z-index:999;animation:slideUp .3s ease;box-shadow:0 4px 20px rgba(0,0,0,.2);}
.toast.hidden{display:none;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

/* SECTION HEADER */
.section-h{font-size:1rem;font-weight:700;margin-bottom:.85rem;}

@media(max-width:700px){
  .sidebar{display:none;}
  .stats-row{grid-template-columns:1fr 1fr;}
  .upload-row{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- ══ AUTH MODAL ══ -->
<div class="modal-overlay" id="authModal">
  <div class="modal">
    <div class="modal-logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="7" fill="#3b5bdb"/>
        <path d="M7 15L14 8L21 15L18 15L18 21L10 21L10 15Z" fill="white"/>
      </svg>
      <div><span>Study</span>Share</div>
    </div>
    <div class="modal-tabs">
      <div class="modal-tab active" onclick="switchTab('login')">Login</div>
      <div class="modal-tab" onclick="switchTab('register')">Register</div>
    </div>
    <!-- LOGIN -->
    <div id="loginForm">
      <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="your@email.com"/></div>
      <div class="form-group"><label>Password</label><input type="password" id="loginPwd" placeholder="Enter password"/></div>
      <div class="form-error" id="loginError"></div>
      <button class="btn-full" id="loginBtn" onclick="doLogin()">Login</button>
    </div>
    <!-- REGISTER -->
    <div id="registerForm" style="display:none;">
      <div class="form-group"><label>Full Name</label><input type="text" id="regName" placeholder="Your full name"/></div>
      <div class="form-group"><label>Email</label><input type="email" id="regEmail" placeholder="your@college.edu"/></div>
      <div class="form-group"><label>Student ID</label><input type="text" id="regStudentId" placeholder="e.g. STU2024001"/></div>
      <div class="form-group"><label>Branch</label>
        <select id="regBranch">
          <option value="">Select Branch</option>
          <option>Computer Engineering</option>
          <option>Mechanical Engineering</option>
          <option>Electronics &amp; Telecom</option>
          <option>Civil Engineering</option>
          <option>Information Technology</option>
        </select>
      </div>
      <div class="form-group"><label>Password</label><input type="password" id="regPwd" placeholder="Min 6 characters"/></div>
      <div class="form-error" id="registerError"></div>
      <button class="btn-full" id="registerBtn" onclick="doRegister()">Create Account</button>
      <p class="form-hint">After registering, an admin can grant you upload access.</p>
    </div>
  </div>
</div>

<!-- ══ UPLOAD MODAL ══ -->
<div class="upload-modal hidden" id="uploadModal">
  <div class="upload-box">
    <h3>Upload Resource</h3>
    <div class="form-group"><label>Title</label><input type="text" id="up_title" placeholder="e.g. Calculus Chapter 3 Notes"/></div>
    <div class="upload-row">
      <div class="form-group"><label>Branch</label>
        <select id="up_branch">
          <option>Computer Engineering</option>
          <option>Mechanical Engineering</option>
          <option>Electronics &amp; Telecom</option>
          <option>Civil Engineering</option>
          <option>Information Technology</option>
        </select>
      </div>
      <div class="form-group"><label>Year</label>
        <select id="up_year">
          <option>FY (First Year)</option>
          <option>SY (Second Year)</option>
          <option>TY (Third Year)</option>
        </select>
      </div>
    </div>
    <div class="upload-row">
      <div class="form-group"><label>Term</label>
        <select id="up_term"><option>Term 1</option><option>Term 2</option></select>
      </div>
      <div class="form-group"><label>Subject</label>
        <input type="text" id="up_subject" placeholder="e.g. Engineering Maths"/>
      </div>
    </div>
    <div class="form-group" id="up_examyear_group" style="display:none;"><label>Exam Year (Past Papers)</label>
      <input type="text" id="up_examyear" placeholder="e.g. 2023"/>
    </div>
    <div class="form-group"><label>Google Drive Link</label>
      <input type="url" id="up_link" placeholder="https://drive.google.com/..."/>
    </div>
    <div class="form-error" id="uploadError"></div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeUpload()">Cancel</button>
      <button class="btn-submit" id="uploadBtn" onclick="submitUpload()">Upload</button>
    </div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app">
  <div class="topbar">
    <div class="t-logo"><span>Study</span>Share</div>
    <div class="t-right">
      <button class="notif-btn" onclick="toggleNotif()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        <span class="notif-badge hidden" id="notifBadge">0</span>
      </button>
      <div class="notif-panel hidden" id="notifPanel">
        <div class="notif-header">Notifications <span class="notif-clear" onclick="clearNotifs()">Clear all</span></div>
        <div class="notif-list" id="notifList"><div class="notif-empty">No notifications</div></div>
      </div>
      <div class="user-chip">
        <div class="avatar" id="topAvatar">SU</div>
        <span class="uname" id="topName">Student</span>
      </div>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <div class="layout">
    <div class="sidebar">
      <div style="margin-bottom:1rem;">
        <div class="sidebar-label">Main</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

  from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// ══ YOUR FIREBASE CONFIG ══
const firebaseConfig = {
  apiKey: "AIzaSyBbotSZUhgfPAkwwb80YgfhTkSo9zyd0hU",
  authDomain: "studyshare-1924f.firebaseapp.com",
  projectId: "studyshare-1924f",
  storageBucket: "studyshare-1924f.firebasestorage.app",
  messagingSenderId: "821521872747",
  appId: "1:821521872747:web:3f11a220c7b52d84043e2e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ══ STATE ══
let currentUser = null;
let currentUserData = null;
let currentPage = 'home';
let folderPath = [];
let uploadSection = null;
let activeFilter = 'All';
let notifications = [];
let unsubscribeDoubts = null;

// ══ AUTH STATE LISTENER ══
onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (snap.exists()) {
      currentUserData = snap.data();
      const initials = currentUserData.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
      document.getElementById('topAvatar').textContent = initials;
      document.getElementById('topName').textContent = currentUserData.name.split(' ')[0];
    }
    document.getElementById('authModal').classList.add('hidden');
    document.getElementById('app').style.display = 'flex';
    showPage('home');
    listenForDoubts();
    listenForForums();
  } else {
    currentUser = null;
    currentUserData = null;
    document.getElementById('authModal').classList.remove('hidden');
    document.getElementById('app').style.display = 'none';
  }
});

// ══ AUTH FUNCTIONS ══
window.switchTab = (tab) => {
  document.querySelectorAll('.modal-tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register'));
  });
  document.getElementById('loginForm').style.display = tab==='login'?'block':'none';
  document.getElementById('registerForm').style.display = tab==='register'?'block':'none';
  document.getElementById('loginError').classList.remove('visible');
  document.getElementById('registerError').classList.remove('visible');
};

window.doLogin = async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const pwd = document.getElementById('loginPwd').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginError');
  if (!email || !pwd) { showErr(err, 'Please fill in all fields.'); return; }
  btn.disabled = true; btn.textContent = 'Logging in...';
  try {
    await signInWithEmailAndPassword(auth, email, pwd);
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Login';
    showErr(err, friendlyError(e.code));
  }
};

window.doRegister = async () => {
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const studentId = document.getElementById('regStudentId').value.trim();
  const branch = document.getElementById('regBranch').value;
  const pwd = document.getElementById('regPwd').value;
  const btn = document.getElementById('registerBtn');
  const err = document.getElementById('registerError');
  if (!name||!email||!studentId||!branch||!pwd) { showErr(err,'Please fill in all fields.'); return; }
  if (pwd.length < 6) { showErr(err,'Password must be at least 6 characters.'); return; }
  btn.disabled = true; btn.textContent = 'Creating account...';
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pwd);
    await setDoc(doc(db,'users',cred.user.uid), {
      name, email, studentId, branch,
      role: 'student',
      createdAt: serverTimestamp()
    });
    showToast('Account created! Welcome to StudyShare.');
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Create Account';
    showErr(err, friendlyError(e.code));
  }
};

window.doLogout = async () => {
  if (unsubscribeDoubts) unsubscribeDoubts();
  if (unsubscribeForums) unsubscribeForums();
  await signOut(auth);
  notifications = [];
  updateNotifBadge();
};

function friendlyError(code) {
  const map = {
    'auth/user-not-found':'No account found with this email.',
    'auth/wrong-password':'Incorrect password.',
    'auth/email-already-in-use':'This email is already registered.',
    'auth/invalid-email':'Please enter a valid email.',
    'auth/weak-password':'Password must be at least 6 characters.',
    'auth/invalid-credential':'Invalid email or password.',
  };
  return map[code] || 'Something went wrong. Please try again.';
}

function showErr(el, msg) { el.textContent = msg; el.classList.add('visible'); }

// ══ NAVIGATION ══
window.showPage = (page) => {
  currentPage = page;
  folderPath = [];
  document.querySelectorAll('.nav-item').forEach(n => {
    n.classList.toggle('active', n.dataset.page === page);
  });
  renderPage();
};

function renderPage() {
  switch(currentPage) {
    case 'home': renderHome(); break;
    case 'lecture':
    case 'pastpapers':
    case 'textbooks':
    case 'studentnotes': renderResourcePage(currentPage); break;
    case 'forums': renderForums(); break;
    case 'doubts': renderDoubts(); break;
  }
}

// ══ DASHBOARD ══

    getDocs(collection(db,'pastpapers')),

    getDocs(collection(db,'doubts'))
  ]);

  const recentDocs = [...lecSnap.docs, ...ppSnap.docs, ...tbSnap.docs, ...snSnap.docs]
    .sort((a,b) => (b.data().createdAt?.seconds||0) - (a.data().createdAt?.seconds||0))

    <div class="stat-card"><div class="stat-label2">Your Branch</div><div class="stat-val" style="font-size:.95rem;">${(currentUserData?.branch||'—').split(' ')[0]}</div><div class="stat-sub">${currentUserData?.role==='verified'?'Verified Uploader':'Student'}</div></div>
    <div class="stat-card"><div class="stat-label2">Role</div><div class="stat-val" style="font-size:.9rem;">${currentUserData?.role==='verified'?'✓ Verified':'Student'}</div><div class="stat-sub">${currentUserData?.role==='verified'?'Can upload all':'Can post notes'}</div></div>

// ══ RESOURCE PAGES ══
const thumbColors = ['thumb-blue','thumb-green','thumb-pink','thumb-amber','thumb-gray'];
const sectionTitles = {lecture:'Lecture Notes',pastpapers:'Past Papers',textbooks:'Textbooks',studentnotes:'Student Notes'};

async function renderResourcePage(type) {
  currentPage = type;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.page===type));
  const mc = document.getElementById('mainContent');
  const canUpload = currentUserData?.role==='verified' || type==='studentnotes';

  if (folderPath.length === 0) {
    mc.innerHTML = `<div class="loading-state"><div class="spinner"></div>Loading...</div>`;
    const snap = await getDocs(collection(db, type));
    const items = snap.docs.map(d=>({id:d.id,...d.data()}));
    const branches = [...new Set(items.map(i=>i.branch).filter(Boolean))];
    mc.innerHTML = `
      ${uploadPanelHTML(type, canUpload)}
      <div class="page-header"><h1 class="page-title">${sectionTitles[type]}</h1></div>
      <div class="folder-grid">
        ${branches.map(b=>`
          <div class="folder-card" onclick="drillDown('${type}','branch','${b}')">
            ${folderIconHTML('#dde7ff','#3b5bdb')}
            <div class="folder-name">${b}</div>
            <div class="folder-count">${items.filter(i=>i.branch===b).length} files</div>
          </div>`).join('')}
        ${branches.length===0?'<p style="color:var(--muted);grid-column:1/-1">No resources yet. Upload the first one!</p>':''}
      </div>`;
  } else if (folderPath[0]==='branch') {
    const branch = folderPath[1];
    mc.innerHTML = `<div class="loading-state"><div class="spinner"></div>Loading...</div>`;
    const snap = await getDocs(query(collection(db,type), where('branch','==',branch)));
    const items = snap.docs.map(d=>({id:d.id,...d.data()}));
    const years = [...new Set(items.map(i=>i.year).filter(Boolean))];
    mc.innerHTML = `
      ${uploadPanelHTML(type,canUpload)}
      <button class="back-btn" onclick="folderPath=[];renderResourcePage('${type}')">← Back</button>
      ${breadcrumbHTML(type,[branch])}
      <div class="folder-grid">
        ${years.map(y=>`
          <div class="folder-card" onclick="drillDown('${type}','year','${branch}','${y}')">
            ${folderIconHTML('#fce4ec','#c2255c')}
            <div class="folder-name">${y}</div>
            <div class="folder-count">${items.filter(i=>i.year===y).length} files</div>
          </div>`).join('')}
        ${years.length===0?'<p style="color:var(--muted)">No files in this branch yet.</p>':''}
      </div>`;
  } else if (folderPath[0]==='year') {
    const [,branch,,year] = folderPath;
    mc.innerHTML = `<div class="loading-state"><div class="spinner"></div>Loading...</div>`;
    const snap = await getDocs(query(collection(db,type), where('branch','==',branch), where('year','==',year)));
    const items = snap.docs.map(d=>({id:d.id,...d.data()}));
    if (type==='pastpapers') {
      const examYears = [...new Set(items.map(i=>i.examYear).filter(Boolean))].sort((a,b)=>b-a);
      mc.innerHTML = `
        ${uploadPanelHTML(type,canUpload)}
        <button class="back-btn" onclick="drillDown('${type}','branch','${branch}')">← Back</button>
        ${breadcrumbHTML(type,[branch,year])}
        <div class="folder-grid">
          ${examYears.map(ey=>`
            <div class="folder-card" onclick="drillDown('${type}','examyear','${branch}','${year}','${ey}')">
              ${folderIconHTML('#d3f9d8','#2f9e44')}
              <div class="folder-name">${ey}</div>
              <div class="folder-count">${items.filter(i=>i.examYear===ey).length} papers</div>
            </div>`).join('')}
          ${examYears.length===0?'<p style="color:var(--muted)">No papers yet.</p>':''}
        </div>`;
    } else {
      const terms = [...new Set(items.map(i=>i.term).filter(Boolean))];
      mc.innerHTML = `
        ${uploadPanelHTML(type,canUpload)}
        <button class="back-btn" onclick="drillDown('${type}','branch','${branch}')">← Back</button>
        ${breadcrumbHTML(type,[branch,year])}
        <div class="folder-grid">
          ${terms.map(t=>`
            <div class="folder-card" onclick="drillDown('${type}','term','${branch}','${year}','${t}')">
              ${folderIconHTML('#fff3cd','#f08c00')}
              <div class="folder-name">${t}</div>
              <div class="folder-count">${items.filter(i=>i.term===t).length} files</div>
            </div>`).join('')}
          ${terms.length===0?'<p style="color:var(--muted)">No files yet.</p>':''}
        </div>`;
    }
  } else if (folderPath[0]==='examyear') {
    const [,branch,,year,,examYear] = folderPath;
    mc.innerHTML = `<div class="loading-state"><div class="spinner"></div>Loading...</div>`;
    const snap = await getDocs(query(collection(db,type),where('branch','==',branch),where('year','==',year),where('examYear','==',examYear)));
    const files = snap.docs.map(d=>({id:d.id,...d.data()}));
    mc.innerHTML = `
      ${uploadPanelHTML(type,canUpload)}
      <button class="back-btn" onclick="drillDown('${type}','year','${branch}','${year}')">← Back</button>
      ${breadcrumbHTML(type,[branch,year,examYear])}
      <div class="file-grid">${files.map(f=>fileCardHTML(f)).join('')}</div>
      ${files.length===0?'<p style="color:var(--muted)">No papers here yet.</p>':''}`;
  } else if (folderPath[0]==='term') {
    const [,branch,,year,,term] = folderPath;
    mc.innerHTML = `<div class="loading-state"><div class="spinner"></div>Loading...</div>`;
    const snap = await getDocs(query(collection(db,type),where('branch','==',branch),where('year','==',year),where('term','==',term)));
    const items = snap.docs.map(d=>({id:d.id,...d.data()}));
    const subjects = [...new Set(items.map(i=>i.subject).filter(Boolean))];
    mc.innerHTML = `
      ${uploadPanelHTML(type,canUpload)}
      <button class="back-btn" onclick="drillDown('${type}','year','${branch}','${year}')">← Back</button>
      ${breadcrumbHTML(type,[branch,year,term])}
      <div class="folder-grid">
        ${subjects.map(s=>`
          <div class="folder-card" onclick="drillDown('${type}','subject','${branch}','${year}','${term}','${s}')">
            ${folderIconHTML('#e8eaf6','#3b5bdb')}
            <div class="folder-name">${s}</div>
            <div class="folder-count">${items.filter(i=>i.subject===s).length} files</div>
          </div>`).join('')}
        ${subjects.length===0?'<p style="color:var(--muted)">No files yet.</p>':''}
      </div>`;
  } else if (folderPath[0]==='subject') {
    const [,branch,,year,,term,,subject] = folderPath;
    mc.innerHTML = `<div class="loading-state"><div class="spinner"></div>Loading...</div>`;
    const snap = await getDocs(query(collection(db,type),where('branch','==',branch),where('year','==',year),where('term','==',term),where('subject','==',subject)));
    const files = snap.docs.map(d=>({id:d.id,...d.data()}));
    mc.innerHTML = `

window.drillDown = (type,...parts) => { folderPath = parts; renderResourcePage(type); };
window.renderResourcePage = renderResourcePage;

function folderIconHTML(bg, color) {
  return `<div class="folder-icon" style="background:${bg}">
    <svg viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
  </div>`;
}

function breadcrumbHTML(type, parts) {
  let html = `<div class="breadcrumb"><span onclick="folderPath=[];renderResourcePage('${type}')">${sectionTitles[type]}</span>`;
  parts.forEach((p,i) => {
    html += `<span class="sep">›</span>`;
    html += i===parts.length-1 ? `<span class="current">${p}</span>` : `<span>${p}</span>`;
  });
  return html + '</div>';
}

function fileCardHTML(f) {
  const thumb = thumbColors[Math.abs((f.title||'').charCodeAt(0)||0) % thumbColors.length];
  return `
  <div class="file-card">
    <div class="file-thumb ${thumb}">
      <div class="file-pdf"><div class="pdf-tag">PDF</div></div>
      ${f.isNew?'<span class="file-badge badge-new">New</span>':''}
    </div>
    <div class="file-body">
      <div class="file-title">${f.title||'Untitled'}</div>
      <div class="file-meta">
        <div class="stars"><span class="s">★★★★</span>☆</div>
        <a class="btn-dl" href="${f.link||'#'}" target="_blank">Open</a>
      </div>
      <div style="margin-top:.4rem;">
        ${f.uploaderRole==='verified'?'<span class="verified-tag">✓ Verified</span>':''}
        <span style="font-size:.7rem;color:var(--muted);margin-left:.3rem">${f.uploaderName||''}</span>
      </div>
    </div>
  </div>`;
}

// ══ UPLOAD ══
function uploadPanelHTML(type, canUpload) {
  if (!canUpload) return '';
  return `<div class="upload-panel" onclick="openUpload('${type}')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/></svg>
    <p>${currentUserData?.role==='verified'?'Upload a verified resource':'Share your notes with classmates'}</p>
    <button class="btn-upload">+ Upload File</button>
  </div>`;
}

window.openUpload = (type) => {
  uploadSection = type;
  document.getElementById('up_examyear_group').style.display = type==='pastpapers' ? 'block' : 'none';
  document.getElementById('uploadModal').classList.remove('hidden');
};
window.closeUpload = () => document.getElementById('uploadModal').classList.add('hidden');

window.submitUpload = async () => {
  const title = document.getElementById('up_title').value.trim();
  const branch = document.getElementById('up_branch').value;
  const year = document.getElementById('up_year').value;
  const term = document.getElementById('up_term').value;
  const subject = document.getElementById('up_subject').value.trim();
  const link = document.getElementById('up_link').value.trim();
  const examYear = document.getElementById('up_examyear').value.trim();
  const err = document.getElementById('uploadError');
  if (!title||!subject||!link) { showErr(err,'Please fill in title, subject, and Google Drive link.'); return; }
  if (!link.startsWith('http')) { showErr(err,'Please enter a valid Google Drive URL.'); return; }
  const btn = document.getElementById('uploadBtn');
  btn.disabled = true; btn.textContent = 'Uploading...';
  try {
    const data = {
      title, branch, year, term, subject, link,
      uploaderName: currentUserData?.name || 'Unknown',
      uploaderRole: currentUserData?.role || 'student',
      uploaderUid: currentUser.uid,
      isNew: true,
      createdAt: serverTimestamp()
    };
    if (uploadSection==='pastpapers' && examYear) data.examYear = examYear;
    await addDoc(collection(db, uploadSection), data);
    closeUpload();
    showToast(`"${title}" uploaded successfully!`);
    ['up_title','up_subject','up_link','up_examyear'].forEach(id => document.getElementById(id).value='');
    err.classList.remove('visible');
    folderPath = [];
    renderResourcePage(uploadSection);
  } catch(e) {
    showErr(err, 'Upload failed: ' + e.message);
  }
  btn.disabled = false; btn.textContent = 'Upload';
};

// ══ FORUMS (real-time) ══
function listenForForums() {
  const q = query(collection(db,'forums'), orderBy('createdAt','desc'));
  unsubscribeForums = onSnapshot(q, (snap) => {
    snap.docChanges().forEach(change => {
      if (change.type==='added' && notifications.length > 0) {
        addNotif(`📢 New notice: "${change.doc.data().title}"`);
      }
    });
    if (currentPage === 'forums') renderForums();
  });
}

async function renderForums() {
  const mc = document.getElementById('mainContent');
  mc.innerHTML = `<div class="loading-state"><div class="spinner"></div>Loading...</div>`;
  const snap = await getDocs(query(collection(db,'forums'), orderBy('createdAt','desc')));
  const isVerified = currentUserData?.role === 'verified';
  mc.innerHTML = `
    <div class="page-header">
      <h1 class="page-title">Course Forums</h1>
      ${isVerified ? `<button class="btn-upload" onclick="openForumPost()">+ Post Notice</button>` : ''}
    </div>
    <div id="forumPostArea"></div>
    ${snap.docs.map(d => {
      const f = d.data();
      return `<div class="notice-card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;">
          <span class="notice-course">${f.course||'General'}</span>
          <span class="notice-date">${f.createdAt ? new Date(f.createdAt.seconds*1000).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : 'Just now'}</span>
        </div>
        <div style="font-weight:700;font-size:.92rem;margin-bottom:.3rem;">${f.title}</div>
        <div style="font-size:.84rem;color:var(--muted);line-height:1.6;">${f.body}</div>
      </div>`;
    }).join('')}
    ${snap.empty ? '<p style="color:var(--muted)">No notices yet.</p>' : ''}`;
}

window.openForumPost = () => {
  const area = document.getElementById('forumPostArea');
  area.innerHTML = `
    <div class="post-doubt-form" style="margin-bottom:1.25rem;">
      <h4>Post a Notice</h4>
      <div class="form-group"><label>Course</label><input type="text" id="forum_course" placeholder="e.g. Engineering Maths"/></div>
      <div class="form-group"><label>Title</label><input type="text" id="forum_title" placeholder="Notice title"/></div>
      <div class="form-group"><label>Message</label><textarea id="forum_body" placeholder="Write your notice..."></textarea></div>
      <div style="display:flex;gap:.75rem;justify-content:flex-end;margin-top:.75rem;">
        <button class="btn-cancel" onclick="document.getElementById('forumPostArea').innerHTML=''">Cancel</button>
        <button class="btn-submit" onclick="submitForumPost()">Post</button>
      </div>
    </div>`;
};

window.submitForumPost = async () => {
  const course = document.getElementById('forum_course').value.trim();
  const title = document.getElementById('forum_title').value.trim();
  const body = document.getElementById('forum_body').value.trim();
  if (!title||!body) { showToast('Please fill in title and message.'); return; }
  await addDoc(collection(db,'forums'), { course, title, body, postedBy: currentUserData?.name, createdAt: serverTimestamp() });
  showToast('Notice posted!');
  addNotif(`📢 New notice posted: "${title}"`);
  renderForums();
};

// ══ DOUBT SOLVER (real-time) ══
function listenForDoubts() {
  const q = query(collection(db,'doubts'), orderBy('createdAt','desc'));
  unsubscribeDoubts = onSnapshot(q, (snap) => {
    snap.docChanges().forEach(change => {
      if (change.type === 'modified') {
        const d = change.doc.data();
        if (d.status === 'answered' && d.askerUid === currentUser?.uid) {
          addNotif(`✅ Your doubt "${d.question?.slice(0,40)}..." has been answered!`);
        }
      }
    });
  });
}

async function renderDoubts() {
  const mc = document.getElementById('mainContent');
  mc.innerHTML = `<div class="loading-state"><div class="spinner"></div>Loading...</div>`;
  let q = query(collection(db,'doubts'), orderBy('createdAt','desc'));
  if (activeFilter !== 'All') q = query(collection(db,'doubts'), where('subject','==',activeFilter), orderBy('createdAt','desc'));
  const snap = await getDocs(q);
  const doubts = snap.docs.map(d=>({id:d.id,...d.data()}));
  const subClass = {Mathematics:'sub-math',Science:'sub-sci',Engineering:'sub-eng',Other:'sub-other'};
  mc.innerHTML = `
    <div class="page-header">
      <h1 class="page-title">Doubt Solver</h1>
      <button class="btn-upload" onclick="toggleDoubtForm()">+ Post a Doubt</button>
    </div>
    <div id="postDoubtFormArea"></div>
    <div style="display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;margin-bottom:1.25rem;">
      ${['All','Mathematics','Science','Engineering','Other'].map(s=>`
        <div class="filter-chip ${activeFilter===s?'active':''}" onclick="setFilter('${s}')">${s}</div>`).join('')}
      <select class="sort-select" style="margin-left:auto" onchange="sortAndRender(this.value)">
        <option value="recent">Most Recent</option>
        <option value="open">Open First</option>
        <option value="answered">Answered First</option>
      </select>
    </div>
    <div id="doubtsList">
      ${doubts.map(d => `
        <div class="doubt-card" id="dc-${d.id}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.6rem;gap:.5rem;flex-wrap:wrap;">
            <div style="display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;">
              <span class="doubt-subject ${subClass[d.subject]||'sub-other'}">${d.subject||'Other'}</span>
              <span class="doubt-status ${d.status==='answered'?'status-answered':'status-open'}">${d.status==='answered'?'✓ Answered':'Open'}</span>
            </div>
            <span style="font-size:.72rem;color:var(--muted)">${d.createdAt ? new Date(d.createdAt.seconds*1000).toLocaleDateString('en-IN') : 'Just now'}</span>
          </div>
          <div style="font-weight:600;font-size:.9rem;margin-bottom:.4rem;">${d.question}</div>
          <div style="font-size:.75rem;color:var(--muted);margin-bottom:.5rem;">Asked by ${d.askerName}</div>
          ${(d.answers||[]).map(a=>`
            <div class="answer-item">
              <div class="answer-by">${a.by}</div>${a.text}
            </div>`).join('')}
          <div class="reply-input-row">
            <input class="reply-input" type="text" placeholder="Write an answer..." id="reply-${d.id}"/>
            <button class="btn-reply" onclick="postReply('${d.id}')">Reply</button>
          </div>
        </div>`).join('')}
      ${doubts.length===0?'<p style="color:var(--muted)">No doubts yet in this category.</p>':''}
    </div>`;
}

window.setFilter = (f) => { activeFilter = f; renderDoubts(); };
window.sortAndRender = (val) => renderDoubts();
window.toggleDoubtForm = () => {
  const area = document.getElementById('postDoubtFormArea');
  if (area.innerHTML) { area.innerHTML=''; return; }
  area.innerHTML = `
    <div class="post-doubt-form">
      <h4>Post Your Doubt</h4>
      <div class="form-group"><label>Your Question</label><textarea id="new_doubt_q" placeholder="Describe your doubt clearly..."></textarea></div>
      <div style="display:grid;grid-template-columns:1fr auto;gap:.6rem;align-items:end;">
        <div class="form-group" style="margin:0"><label>Subject</label>
          <select id="new_doubt_sub"><option>Mathematics</option><option>Science</option><option>Engineering</option><option>Other</option></select>
        </div>
        <button class="btn-submit" style="height:40px" onclick="submitDoubt()">Post</button>
      </div>
    </div>`;
};

window.submitDoubt = async () => {
  const q = document.getElementById('new_doubt_q')?.value.trim();
  const sub = document.getElementById('new_doubt_sub')?.value;
  if (!q) { showToast('Please write your doubt first.'); return; }
  await addDoc(collection(db,'doubts'), {
    question: q, subject: sub,
    askerName: currentUserData?.name || 'Anonymous',
    askerUid: currentUser.uid,
    status: 'open', answers: [],
    createdAt: serverTimestamp()
  });
  showToast('Doubt posted!');
  document.getElementById('postDoubtFormArea').innerHTML = '';
  renderDoubts();
};

window.postReply = async (doubtId) => {
  const input = document.getElementById(`reply-${doubtId}`);
  if (!input?.value.trim()) { showToast('Please type an answer first.'); return; }
  const ref = doc(db,'doubts',doubtId);
  const snap = await getDoc(ref);
  if (!snap.exists()) return;
  const data = snap.data();
  const answers = [...(data.answers||[]), { by: currentUserData?.name||'Anonymous', text: input.value.trim() }];
  await setDoc(ref, {...data, answers, status:'answered'}, {merge:true});
  showToast('Answer posted!');
  renderDoubts();
};

// ══ NOTIFICATIONS ══
function addNotif(msg) {
  notifications.unshift({msg, time: new Date().toLocaleTimeString()});
  updateNotifBadge();
  showToast(msg);
}
function updateNotifBadge() {
  const badge = document.getElementById('notifBadge');
  if (notifications.length > 0) { badge.classList.remove('hidden'); badge.textContent = notifications.length; }
  else badge.classList.add('hidden');
}
window.toggleNotif = () => {
  const p = document.getElementById('notifPanel');
  p.classList.toggle('hidden');
  const list = document.getElementById('notifList');
  list.innerHTML = notifications.length
    ? notifications.map(n=>`<div class="notif-item"><div class="notif-dot2"></div><div><p>${n.msg}</p><time>${n.time}</time></div></div>`).join('')
    : '<div class="notif-empty">No notifications</div>';
};
window.clearNotifs = () => {
  notifications = [];
  updateNotifBadge();
  document.getElementById('notifPanel').classList.add('hidden');
};
document.addEventListener('click', e => {
  const panel = document.getElementById('notifPanel');
  if (!panel.classList.contains('hidden') && !e.target.closest('.notif-btn') && !e.target.closest('.notif-panel'))
    panel.classList.add('hidden');
});

// ══ TOAST ══
window.showToast = (msg) => {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.remove('hidden');
  clearTimeout(window._tt);
  window._tt = setTimeout(()=>t.classList.add('hidden'), 3000);
};
function showToast(msg) { window.showToast(msg); }
</script>
</body>
</html>
